# Sveltia CMS — content model for Peniche On Surf
# Pedro edits the site content here; saving creates a commit on GitHub,
# Cloudflare Pages rebuilds automatically.

backend:
  name: github
  repo: OWNER/REPO            # <-- set to your GitHub repo, e.g. greyform/peniche-on-surf
  branch: main
  base_url: https://YOUR-WORKER.workers.dev   # <-- your sveltia-cms-auth Worker URL

# Where uploaded photos go (gallery images, etc.)
media_folder: "public/uploads"
public_folder: "/uploads"

# Show a live preview link in the editor
site_url: https://penicheonsurf.com

collections:
  - name: content
    label: "Website content"
    files:
      - name: en
        label: "Website (English)"
        file: "src/data/en.json"
